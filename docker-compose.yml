services:
  db:
    image: postgres:16-alpine
    container_name: auth_system_db
    environment:
      POSTGRES_DB: auth_system
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: auth_system_web
    command: sh -c "python manage.py migrate && python manage.py seed_data && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: auth_system
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
      DB_HOST: db
      DB_PORT: "5432"

volumes:
  postgres_data:
